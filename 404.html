<!doctype html>
<!--
  404 — Shaun Burdick Consulting
  Matching terminal aesthetic
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · Shaun Burdick Consulting</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/terminal.css" />
  <style>
    html { height: 100%; }
    body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      display: grid;
      place-items: center;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); }
    a:hover { text-decoration: underline; }

    .terminal { max-width: 600px; padding: 48px 24px; }
    .error-code {
      font-size: clamp(72px, 15vw, 120px);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }
    .error-msg { color: var(--fg); font-size: 18px; margin-bottom: 24px; }

    .home-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-top: 16px;
      transition: background 0.15s ease;
    }
    .home-link:hover { background: var(--accent-soft); text-decoration: none; }
    .home-link::after { content: '→'; }
  </style>
</head>
<body>
  <a href="#error-content" class="skip-link">Skip to error content</a>
  <div class="terminal" id="error-content" tabindex="-1">
    <div class="terminal-line"><span class="prompt">></span> curl -s https://burdick.dev/this-path</div>
    <div class="terminal-line" style="color: var(--accent); margin-bottom: 16px;">
      <span class="prompt">></span> curl: (404) resource not found
    </div>

    <div class="error-code">404</div>
    <div class="error-msg">That path doesn't exist on this server.</div>

    <div class="terminal-line"><span class="prompt">></span> Maybe the resource was moved, renamed, or never existed.</div>
    <div class="terminal-line" style="margin-top: 4px;"><span class="prompt">></span> Try the root — everything lives there.<span class="cursor"></span></div>

    <a href="/" class="home-link">cd ~/</a>
  </div>
</body>
</html>
